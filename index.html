<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安裝施工費用試算表 - 竣宇道安</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --accent: #1e3a5f;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --urgent: #dc2626; /* 醒目紅色 */
        }

        * { box-sizing: border-box; font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }

        .page-header {
            background: var(--accent);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        /* LOGO 置中與白色濾鏡 */
        .page-header img {
            display: block;
            margin: 0 auto 12px;
            height: 60px;
            filter: brightness(0) invert(1);
        }

        .page-header h1 { margin: 0; font-size: 1.5rem; }
        .page-header p { margin: 5px 0 0; opacity: 0.9; font-size: 0.9rem; }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        /* 藍框條款樣式 */
        .terms-box {
            background: #f0f7ff;
            border: 2px solid #2563eb;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        .terms-box h3 { color: #2563eb; margin-top: 0; font-size: 1rem; border-bottom: 1px solid #2563eb; padding-bottom: 5px; }
        .terms-box ul { padding-left: 20px; margin: 10px 0 0; }

        .card { background: var(--card); border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
        .section-title { font-size: 1.1rem; font-weight: 700; color: var(--accent); margin-bottom: 15px; display: flex; align-items: center; }
        .section-title::before { content: ""; display: inline-block; width: 4px; height: 18px; background: var(--primary); margin-right: 10px; border-radius: 2px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.95rem; }
        select, input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; }

        /* 商品項目列表 */
        .item-list { display: grid; gap: 12px; }
        .item-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px; 
            border: 1px solid #f1f5f9; 
            border-radius: 8px;
            transition: background 0.2s;
        }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; font-size: 1rem; display: block; }
        
        /* 價格與紅色視覺提醒 */
        .item-price { font-size: 0.85rem; color: var(--secondary); }
        .discount-label { color: var(--urgent); font-weight: bold; margin-left: 5px; animation: pulse 2s infinite; }
        .hint-label { color: #ef4444; font-size: 0.75rem; display: block; margin-top: 2px; }

        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .btn-qty { 
            width: 36px; height: 36px; border-radius: 50%; border: none; 
            background: #f1f5f9; color: var(--accent); font-size: 1.2rem; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .qty-val { width: 40px; text-align: center; font-weight: 700; }

        /* 急件加收費紅色樣式 */
        .urgent-card { border: 2px solid var(--urgent); background: #fef2f2; }
        .urgent-card .section-title { color: var(--urgent); }
        .urgent-card .section-title::before { background: var(--urgent); }

        .total-panel { 
            position: sticky; bottom: 20px; background: var(--accent); 
            color: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .grand-total { border-top: 1px solid rgba(255,255,255,0.2); pt: 10px; font-size: 1.3rem; font-weight: 800; color: #fbbf24; }
    </style>
</head>
<body>

<div class="page-header">
    <img src="價目表用LOGO.svg" alt="竣宇道安">
    <h1>安裝施工費用試算表</h1>
    <p>依據最新 2024 價格母檔即時試算</p>
</div>

<div class="container">
    <div class="terms-box">
        <h3>💡 專業施工說明與條款</h3>
        <ul>
            <li>本試算表價格已含基本施工安裝工費。</li>
            <li><strong>派遣時間：</strong>以本公司排定之施工日期為主。如需指定日期或夜間施工，請另洽詢。</li>
            <li><strong>特殊路面：</strong>柏油路面需植筋加強時，將依各品項單價加收費用。</li>
            <li><strong>假日加成：</strong>週六、週日及國定假日施工，總施工費需額外加收 2,000 元。</li>
        </ul>
    </div>

    <div class="card">
        <div class="section-title">第一步：選擇施工區域</div>
        <div class="form-group">
            <label>施工縣市 (車馬費計算基準)</label>
            <select id="location" onchange="updateAll()">
                <optgroup label="北部地區 (不另收車馬費)">
                    <option value="0">桃園市 / 新北市 / 台北市 (車馬費 $0)</option>
                </optgroup>
                <optgroup label="其他地區 (需收車馬費)">
                    <option value="1000">新竹縣市 / 基隆市 (+$1,000)</option>
                    <option value="2000">苗栗縣市 (+$2,000)</option>
                    <option value="3000">台中市 / 宜蘭縣 (+$3,000)</option>
                </optgroup>
            </select>
        </div>
    </div>

    <div id="product-sections"></div>

    <div class="card urgent-card">
        <div class="section-title">第三步：急件與日期需求</div>
        <div class="form-group">
            <label style="display: flex; align-items: center; cursor: pointer;">
                <input type="checkbox" id="isUrgent" onchange="updateAll()" style="width: 20px; margin-right: 10px;">
                指定日期 / 趕件施工 (加收 $2,000)
            </label>
            <p style="color: var(--urgent); font-size: 0.8rem; margin: 5px 0 0 30px;">※ 若未勾選，將由本公司安排鄰近施工日派員。</p>
        </div>
    </div>

    <div class="total-panel">
        <div class="total-row"><span>施工項目合計：</span><span id="items-sum">$0</span></div>
        <div class="total-row"><span>地區車馬費：</span><span id="travel-fee">$0</span></div>
        <div id="urgent-fee-row" class="total-row" style="display:none;"><span>急件/指定日期費：</span><span>$2,000</span></div>
        <div class="total-row grand-total"><span>預估總金額：</span><span id="final-total">$0</span></div>
    </div>
</div>

<script>
    // 100% 參照價格母檔之最新數據
    const catDefs = {
        'A. 反射鏡系列': {
            thresholds: [3, 10], // 3面(含)以下, 4-10面, 11面以上
            items: [
                { name: '60公分', prices: [1500, 1200, 1000] },
                { name: '80公分', prices: [1500, 1200, 1000] },
                { name: '100公分', prices: [1500, 1200, 1000] },
                { name: '壁掛安裝', prices: [300, 250, 200] },
                { name: '錏管+四方底座(立)(含料)', prices: [1800, 1700, 1600] },
                { name: '錏管(埋)(含料)', prices: [1800, 1700, 1600] },
                { name: '鍍鋅管+四方底座(立)(含料)', prices: [2150, 2050, 1900] },
                { name: '鍍鋅管(埋)', prices: [2150, 2050, 1900] },
                { name: '黃黑反光貼紙(含料)一米長', prices: [250, 200, 150] }
            ]
        },
        'B. 車輪檔系列': {
            thresholds: [50, 200], // 50(含)以下, 51-200, 201以上
            items: [
                { name: '鋁合金車輪檔', prices: [150, 120, 100] },
                { name: '塑膠車輪檔', prices: [150, 120, 100] },
                { name: '橡膠車輪擋', prices: [225, 185, 160] },
                { name: 'PVC車輪檔', prices: [180, 150, 130] },
                { name: '柏油路面加強', prices: [75, 65, 50] },
                { name: '一般車擋拆除', prices: [125, 100, 75] },
                { name: '螺絲隱藏車擋拆除', prices: [200, 165, 125] }
            ]
        },
        'C. 防撞桿系列': {
            thresholds: [50, 150],
            items: [
                { name: 'PE防撞桿', prices: [150, 125, 100] },
                { name: 'EVA防撞桿', prices: [150, 125, 100] },
                { name: 'PU防撞桿', prices: [150, 125, 100] },
                { name: '防護桿', prices: [200, 165, 140] },
                { name: '塑膠鍊條', prices: [135, 128, 120] },
                { name: '台/100*30 U型護欄', prices: [1350, 1300, 1220] },
                { name: '陸/100*30 U型護欄', prices: [1180, 1140, 1090] }
            ]
        },
        'D. 減速墊系列': {
            thresholds: [30, 100], // 15米(含)以下=30塊, 16-50米=31-100塊
            items: [
                { name: '橡膠 50*50*2.5CM', prices: [525, 475, 400] },
                { name: '橡膠 50*50*3.5CM', prices: [525, 475, 400] },
                { name: '橡膠 50*50*5CM', prices: [525, 475, 400] }
            ]
        },
        'E. 護邊條系列': {
            thresholds: [50, 150],
            items: [
                { name: 'PVC彩紋防撞條', prices: [150, 120, 100] },
                { name: 'PU護邊條', prices: [120, 100, 100] },
                { name: '螢光鋁邊條', prices: [150, 120, 100] },
                { name: '橡膠護邊條', prices: [150, 120, 100] }
            ]
        }
    };

    const selections = {};

    function init() {
        const wrapper = document.getElementById('product-sections');
        for (const [catName, config] of Object.entries(catDefs)) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="section-title">${catName}</div><div class="item-list" id="list-${catName}"></div>`;
            wrapper.appendChild(card);
            
            const list = document.getElementById(`list-${catName}`);
            config.items.forEach(item => {
                const itemKey = `${catName}-${item.name}`;
                selections[itemKey] = 0;
                
                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-price" id="price-display-${itemKey}">單價 $${item.prices[0]}</span>
                        <span id="hint-${itemKey}" class="hint-label"></span>
                    </div>
                    <div class="qty-controls">
                        <button class="btn-qty" onclick="changeQty('${itemKey}', -1)">-</button>
                        <span class="qty-val" id="qty-${itemKey}">0</span>
                        <button class="btn-qty" onclick="changeQty('${itemKey}', 1)">+</button>
                    </div>
                `;
                list.appendChild(row);
            });
        }
    }

    function changeQty(key, delta) {
        selections[key] = Math.max(0, selections[key] + delta);
        document.getElementById(`qty-${key}`).innerText = selections[key];
        updateAll();
    }

    function updateAll() {
        let itemsSum = 0;

        for (const [catName, config] of Object.entries(catDefs)) {
            config.items.forEach(item => {
                const key = `${catName}-${item.name}`;
                const qty = selections[key];
                
                // 獨立計價邏輯：依據單一品項數量判斷級距
                let tier = 0;
                if (qty > config.thresholds[1]) tier = 2;
                else if (qty > config.thresholds[0]) tier = 1;
                
                const currentPrice = item.prices[tier];
                itemsSum += qty * currentPrice;

                // 視覺提醒：紅色 [已享優惠價]
                const priceDisp = document.getElementById(`price-display-${key}`);
                const hintDisp = document.getElementById(`hint-${key}`);
                
                if (qty > 0 && tier > 0) {
                    priceDisp.innerHTML = `單價 <span style="color:var(--urgent); font-weight:bold;">$${currentPrice}</span> <span class="discount-label">[已享優惠價]</span>`;
                    hintDisp.innerText = "";
                } else if (qty > 0 && qty <= config.thresholds[0]) {
                    priceDisp.innerText = `單價 $${item.prices[0]}`;
                    const need = config.thresholds[0] + 1 - qty;
                    if (need <= 5) {
                        hintDisp.innerText = `再加 ${need} 單位即享優惠價`;
                    } else {
                        hintDisp.innerText = "";
                    }
                } else {
                    priceDisp.innerText = `單價 $${item.prices[0]}`;
                    hintDisp.innerText = "";
                }
            });
        }

        const travelFee = parseInt(document.getElementById('location').value);
        const isUrgent = document.getElementById('isUrgent').checked;
        const urgentFee = isUrgent ? 2000 : 0;

        document.getElementById('items-sum').innerText = `$${itemsSum.toLocaleString()}`;
        document.getElementById('travel-fee').innerText = `$${travelFee.toLocaleString()}`;
        document.getElementById('urgent-fee-row').style.display = isUrgent ? 'flex' : 'none';
        document.getElementById('final-total').innerText = `$${(itemsSum + travelFee + urgentFee).toLocaleString()}`;
    }

    init();
</script>

</body>
</html>
